name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: npm install
      - run: npm run build
      - run: npm install -g @capacitor/cli
      - run: npx cap add android
      - run: npx cap sync android

      # 全面屏：启用 edge-to-edge
      - name: Enable edge-to-edge
        run: |
          sed -i 's/super.onCreate(savedInstanceState)/super.onCreate(savedInstanceState)\n        if (android.os.Build.VERSION.SDK_INT >= 35) {\n            androidx.core.view.WindowCompat.setDecorFitsSystemWindows(getWindow(), false);\n        }/' android/app/src/main/java/com/ayou/crypto/MainActivity.java || true

      - name: Set target SDK 35
        run: |
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle || true

      - run: chmod +x android/gradlew
      - run: cd android && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ayou-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
